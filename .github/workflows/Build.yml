name: Android CI/CD Build

# This determines when the workflow will run. 
# Here, it runs on pushes and pull requests to the main/master branches.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the Java Development Kit (JDK)
      # Modern Android projects typically require Java 17. Change to '11' if using an older Gradle version.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Make the Gradle wrapper executable (sometimes Linux permissions get lost in Git)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Build the Debug APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 5. Upload the generated APK so you can download it from the GitHub Actions tab
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # Ensure this path matches your app's module name (usually 'app')
          path: app/build/outputs/apk/debug/app-debug.apk
